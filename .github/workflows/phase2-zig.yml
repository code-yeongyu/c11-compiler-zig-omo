name: phase-2-zig

on:
  push:
    branches: [master]
    paths:
      - 'phase2/**'
      - '.github/workflows/phase2-zig.yml'
  pull_request:
    paths:
      - 'phase2/**'
      - '.github/workflows/phase2-zig.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: phase-2 guard
    runs-on: ubuntu-latest
    outputs:
      has_zig: ${{ steps.detect.outputs.has_zig }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -f phase2/build.zig ]; then
            echo "has_zig=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_zig=false" >> "$GITHUB_OUTPUT"
            echo "phase2/build.zig not present yet — phase-2 build/test skipped."
          fi

  build-and-test:
    name: zcc build & test (${{ matrix.os }})
    needs: guard
    if: needs.guard.outputs.has_zig == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0
      - name: zig fmt --check
        working-directory: phase2
        run: zig fmt --check src tests build.zig
      - name: zig build
        working-directory: phase2
        run: zig build -Drelease-safe
      - name: zig build test
        working-directory: phase2
        run: zig build test --summary all
